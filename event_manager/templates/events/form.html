{% extends 'base.html' %}
{% block title %}{{ 'Edit Event' if event else 'Add Event' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">{{ '✏️ Edit Event' if event else '➕ Add New Event' }}</h5>
            </div>
            <div class="card-body">
                <form action="{{ '/events/edit/' + event['event_id']|string if event else '/events/add' }}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" name="title" class="form-control"
                               value="{{ event['title'] if event else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control"
                                  rows="3">{{ event['description'] if event else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Event Date</label>
                        <input type="date" name="event_date" class="form-control"
                               value="{{ event['event_date'] if event else '' }}" required>
                    </div>

                    <!-- Organizer dropdown -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Organizer</label>
                        <select name="organizer_id" class="form-select" required>
                            <option value="">-- Select Organizer --</option>
                            {% for o in organizers %}
                            <option value="{{ o['organizer_id'] }}"
                                {{ 'selected' if event and event['organizer_id'] == o['organizer_id'] }}>
                                {{ o['name'] }} — {{ o['organization'] }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Venue dropdown -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Venue</label>
                        <select name="venue_id" class="form-select" required>
                            <option value="">-- Select Venue --</option>
                            {% for v in venues %}
                            <option value="{{ v['venue_id'] }}"
                                {{ 'selected' if event and event['venue_id'] == v['venue_id'] }}>
                                {{ v['name'] }} — {{ v['city'] }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a href="/events" class="btn btn-secondary">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
