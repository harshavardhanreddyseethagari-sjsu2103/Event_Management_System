{% extends 'base.html' %}
{% block title %}{{ 'Edit Venue' if venue else 'Add Venue' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">{{ '✏️ Edit Venue' if venue else '➕ Add New Venue' }}</h5>
            </div>
            <div class="card-body">
                <form action="{{ '/venues/edit/' + venue['venue_id']|string if venue else '/venues/add' }}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Venue Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ venue['name'] if venue else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Address</label>
                        <input type="text" name="address" class="form-control"
                               value="{{ venue['address'] if venue else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" name="city" class="form-control"
                               value="{{ venue['city'] if venue else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">State</label>
                        <input type="text" name="state" class="form-control"
                               value="{{ venue['state'] if venue else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Capacity</label>
                        <input type="number" name="capacity" class="form-control"
                               value="{{ venue['capacity'] if venue else '' }}" min="1" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a href="/venues" class="btn btn-secondary">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
