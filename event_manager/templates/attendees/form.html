{% extends 'base.html' %}
{% block title %}{{ 'Edit Attendee' if attendee else 'Add Attendee' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">{{ '✏️ Edit Attendee' if attendee else '➕ Add New Attendee' }}</h5>
            </div>
            <div class="card-body">
                <form action="{{ '/attendees/edit/' + attendee['attendee_id']|string if attendee else '/attendees/add' }}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ attendee['name'] if attendee else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ attendee['email'] if attendee else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="text" name="phone" class="form-control"
                               value="{{ attendee['phone'] if attendee else '' }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a href="/attendees" class="btn btn-secondary">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
